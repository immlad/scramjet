<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scramjet Launcher</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Top Bar -->
    <header class="topbar">
        <div class="title">Scramjet</div>
    </header>

    <!-- Search Bar -->
    <div class="search-container">
        <form id="scramjet-form">
            <input id="url-input" type="text" placeholder="Search or enter URL">
        </form>
    </div>

    <!-- App Grid -->
    <section class="app-grid">
        <div class="app"><img src="https://www.google.com/favicon.ico"><span>Google</span></div>
        <div class="app"><img src="https://www.youtube.com/s/desktop/fe2e4e3e/img/favicon_144x144.png"><span>YouTube</span></div>
        <div class="app"><img src="https://www.roblox.com/favicon.ico"><span>Roblox</span></div>
        <div class="app"><img src="https://www.bing.com/sa/simg/favicon-2x.ico"><span>Bing</span></div>
        <div class="app"><img src="https://github.githubassets.com/favicons/favicon.png"><span>GitHub</span></div>
        <div class="app"><img src="https://upload.wikimedia.org/wikipedia/commons/4/4e/Microsoft_Edge_logo_%282019%29.svg"><span>Edge</span></div>
    </section>

    <!-- Dock -->
    <div class="dock">
        <div class="dock-item"><img src="https://www.google.com/favicon.ico"></div>
        <div class="dock-item"><img src="https://www.youtube.com/s/desktop/fe2e4e3e/img/favicon_144x144.png"></div>
        <div class="dock-item"><img src="https://www.roblox.com/favicon.ico"></div>
        <div class="dock-item"><img src="https://github.githubassets.com/favicons/favicon.png"></div>
    </div>

    <script src="script.js"></script>
</body>
</html>
